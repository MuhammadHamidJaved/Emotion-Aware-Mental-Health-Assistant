<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
</head>
<body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.5; color: #111;">
  <div style="max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 20px; margin: 0 0 16px;">{{ title }}</h1>
    <p style="margin: 0 0 16px; white-space: pre-wrap;">{{ message }}</p>
    {% if action_url %}
    <p style="margin: 24px 0 0;">
      <a href="{{ action_url }}" style="display: inline-block; padding: 10px 18px; background: #111; color: #fff; text-decoration: none; border-radius: 8px;">Open in EmotionAI</a>
    </p>
    {% endif %}
    <p style="margin: 32px 0 0; font-size: 12px; color: #666;">You received this because notification settings are enabled in your account.</p>
  </div>
</body>
</html>
